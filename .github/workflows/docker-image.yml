name: Build and Push Docker Image to Docker Hub

on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        run: npm test

      - name: Build forward widget bundle
        run: npm run build-forward-widget

      # 从 danmu_api/configs/globals.js 中读取版本号
      - name: Read version from globals.js
        id: version
        run: |
          VERSION=$(sed -nE "s/^  VERSION: '([^']+)'.*/\1/p" danmu_api/configs/globals.js | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "Failed to read VERSION from danmu_api/configs/globals.js" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 设置 Docker 镜像缓存（可选,加速构建）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 构建 Docker 镜像,并指定平台为 amd64 和 arm64,推送到 Docker Hub
      # 使用单条命令同时指定两个标签,避免重复构建
      - name: Build and Push Docker image with version and latest tag
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKER_USERNAME }}/danmu-api:${{ env.VERSION }} \
            -t ${{ secrets.DOCKER_USERNAME }}/danmu-api:latest \
            --push .
